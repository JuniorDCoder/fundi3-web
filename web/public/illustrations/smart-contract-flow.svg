<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none" role="img" aria-label="A smart contract flow: when a payment is received, goods are released automatically, with no middleman in between">
  <rect width="800" height="320" fill="#0A0F0E"/>

  <!-- flow arrows between boxes -->
  <g stroke="#EF9F27" stroke-width="3">
    <line x1="248" y1="160" x2="298" y2="160"/>
    <line x1="506" y1="160" x2="556" y2="160"/>
  </g>
  <g fill="#EF9F27">
    <path d="M298 160l-9-8v16z"/>
    <path d="M556 160l-9-8v16z"/>
  </g>

  <g font-family="JetBrains Mono, monospace">
    <!-- Box 1: IF payment received -->
    <g transform="translate(40,70)">
      <rect width="208" height="180" rx="14" fill="#111915" stroke="#1D9E75" stroke-width="2.5"/>
      <text x="104" y="36" text-anchor="middle" font-size="13" letter-spacing="3" fill="#EF9F27">IF</text>
      <circle cx="104" cy="90" r="28" fill="none" stroke="#9FE1CB" stroke-width="2.5"/>
      <path d="M92 90h24M104 78v24" stroke="#9FE1CB" stroke-width="2.5" stroke-linecap="round"/>
      <text x="104" y="148" text-anchor="middle" font-size="14" fill="#F5FAF7">Payment</text>
      <text x="104" y="168" text-anchor="middle" font-size="14" fill="#F5FAF7">received</text>
    </g>

    <!-- Box 2: THEN release goods -->
    <g transform="translate(298,70)">
      <rect width="208" height="180" rx="14" fill="#111915" stroke="#1D9E75" stroke-width="2.5"/>
      <text x="104" y="36" text-anchor="middle" font-size="13" letter-spacing="3" fill="#EF9F27">THEN</text>
      <g stroke="#9FE1CB" stroke-width="2.5" fill="none" stroke-linejoin="round">
        <path d="M76 74l28-16 28 16-28 16z"/>
        <path d="M76 74v32l28 16 28-16V74"/>
        <line x1="104" y1="90" x2="104" y2="122"/>
      </g>
      <text x="104" y="148" text-anchor="middle" font-size="14" fill="#F5FAF7">Goods</text>
      <text x="104" y="168" text-anchor="middle" font-size="14" fill="#F5FAF7">released</text>
    </g>

    <!-- Box 3: Automatically, no middleman -->
    <g transform="translate(556,70)">
      <rect width="208" height="180" rx="14" fill="#111915" stroke="#EF9F27" stroke-width="2.5"/>
      <text x="104" y="36" text-anchor="middle" font-size="11" letter-spacing="2" fill="#FAC775">AUTOMATIC</text>
      <g stroke="#FAC775" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="104" cy="90" r="18"/>
        <circle cx="104" cy="90" r="5"/>
        <line x1="104" y1="64" x2="104" y2="56"/>
        <line x1="104" y1="116" x2="104" y2="124"/>
        <line x1="78" y1="90" x2="70" y2="90"/>
        <line x1="130" y1="90" x2="138" y2="90"/>
        <line x1="86" y1="72" x2="80" y2="66"/>
        <line x1="122" y1="72" x2="128" y2="66"/>
        <line x1="86" y1="108" x2="80" y2="114"/>
        <line x1="122" y1="108" x2="128" y2="114"/>
      </g>
      <text x="104" y="148" text-anchor="middle" font-size="14" fill="#F5FAF7">No</text>
      <text x="104" y="168" text-anchor="middle" font-size="14" fill="#F5FAF7">middleman</text>
    </g>
  </g>
</svg>
