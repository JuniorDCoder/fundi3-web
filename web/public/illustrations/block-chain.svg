<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none" role="img" aria-label="Four blocks linked in a row, each one referencing the fingerprint of the block before it">
  <rect width="800" height="320" fill="#0A0F0E"/>

  <!-- chain links between blocks -->
  <g stroke="#EF9F27" stroke-width="3">
    <line x1="195" y1="160" x2="225" y2="160"/>
    <line x1="395" y1="160" x2="425" y2="160"/>
    <line x1="595" y1="160" x2="625" y2="160"/>
  </g>
  <g fill="#EF9F27">
    <path d="M210 160l-7-7v14z"/>
    <path d="M410 160l-7-7v14z"/>
    <path d="M610 160l-7-7v14z"/>
  </g>

  <!-- four blocks -->
  <g font-family="JetBrains Mono, monospace">
    <!-- genesis block -->
    <g transform="translate(50,90)">
      <rect width="145" height="140" rx="12" fill="#111915" stroke="#1D9E75" stroke-width="2.5"/>
      <text x="72" y="32" text-anchor="middle" font-size="13" fill="#9FE1CB">genesis</text>
      <g stroke="#4A6358" stroke-width="2.5" stroke-linecap="round">
        <line x1="22" y1="60" x2="123" y2="60"/>
        <line x1="22" y1="84" x2="123" y2="84"/>
        <line x1="22" y1="108" x2="90" y2="108"/>
      </g>
      <rect x="22" y="118" width="101" height="10" rx="5" fill="#0F6E56" opacity="0.5"/>
    </g>

    <!-- block 2 -->
    <g transform="translate(250,90)">
      <rect width="145" height="140" rx="12" fill="#111915" stroke="#1E2E28" stroke-width="2"/>
      <text x="72" y="32" text-anchor="middle" font-size="13" fill="#4A6358">block 2</text>
      <g stroke="#4A6358" stroke-width="2.5" stroke-linecap="round">
        <line x1="22" y1="60" x2="123" y2="60"/>
        <line x1="22" y1="84" x2="123" y2="84"/>
        <line x1="22" y1="108" x2="90" y2="108"/>
      </g>
      <rect x="22" y="118" width="101" height="10" rx="5" fill="#1D9E75" opacity="0.35"/>
    </g>

    <!-- block 3 -->
    <g transform="translate(450,90)">
      <rect width="145" height="140" rx="12" fill="#111915" stroke="#1E2E28" stroke-width="2"/>
      <text x="72" y="32" text-anchor="middle" font-size="13" fill="#4A6358">block 3</text>
      <g stroke="#4A6358" stroke-width="2.5" stroke-linecap="round">
        <line x1="22" y1="60" x2="123" y2="60"/>
        <line x1="22" y1="84" x2="123" y2="84"/>
        <line x1="22" y1="108" x2="90" y2="108"/>
      </g>
      <rect x="22" y="118" width="101" height="10" rx="5" fill="#1D9E75" opacity="0.35"/>
    </g>

    <!-- newest block -->
    <g transform="translate(650,90)">
      <rect width="145" height="140" rx="12" fill="#111915" stroke="#EF9F27" stroke-width="2.5"/>
      <text x="72" y="32" text-anchor="middle" font-size="13" fill="#FAC775">newest</text>
      <g stroke="#9FE1CB" stroke-width="2.5" stroke-linecap="round">
        <line x1="22" y1="60" x2="123" y2="60"/>
        <line x1="22" y1="84" x2="123" y2="84"/>
        <line x1="22" y1="108" x2="90" y2="108"/>
      </g>
      <rect x="22" y="118" width="101" height="10" rx="5" fill="#EF9F27" opacity="0.55"/>
    </g>
  </g>
</svg>
